<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="../assets/logo.png" alt="Kenya Marketplace">
            </a>
            <div class="nav-links">
                <a href="cart.html" class="nav-link"><i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span></a>
                <div class="auth-links" id="authLinks">
                    <a href="login.html" class="btn btn-outline">Login</a>
                </div>
                <div class="user-menu" id="userMenu" style="display:none;">
                    <span id="userName"></span>
                    <a href="#" onclick="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="product-detail-page">
        <div class="product-detail-container" id="productDetail">
            <!-- Populated by JS -->
        </div>

        <section class="reviews-section">
            <h2>Customer Reviews</h2>
            <div id="reviewsList"></div>
            <div class="add-review" id="addReviewSection" style="display:none;">
                <h3>Write a Review</h3>
                <form id="reviewForm" onsubmit="submitReview(event)">
                    <div class="rating-input">
                        <label>Rating:</label>
                        <select id="rating">
                            <option value="5">5 Stars</option>
                            <option value="4">4 Stars</option>
                            <option value="3">3 Stars</option>
                            <option value="2">2 Stars</option>
                            <option value="1">1 Star</option>
                        </select>
                    </div>
                    <textarea id="comment" placeholder="Share your experience..." rows="4"></textarea>
                    <button type="submit" class="btn btn-primary">Submit Review</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        // ─── INLINE AUTH FUNCTIONS ─────────────────────────────────────
        
        const API_BASE_URL = 'https://kenya-marketplace-api.onrender.com';

        function getToken() {
            return localStorage.getItem('access_token') || localStorage.getItem('token');
        }

        function getUser() {
            try {
                return JSON.parse(localStorage.getItem('user') || 'null');
            } catch {
                return null;
            }
        }

        function updateAuthUI() {
            const token = getToken();
            const user = getUser();
            const userMenu = document.getElementById('userMenu');
            const userName = document.getElementById('userName');
            const authLinks = document.getElementById('authLinks');
            
            if (token && user) {
                if (userMenu) userMenu.style.display = 'flex';
                if (userName) userName.textContent = user.full_name || user.email || 'User';
                if (authLinks) authLinks.style.display = 'none';
            } else {
                if (userMenu) userMenu.style.display = 'none';
                if (authLinks) authLinks.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // ─── CART COUNT ────────────────────────────────────────────────

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.querySelectorAll('#cartCount').forEach(el => {
                el.textContent = totalItems;
            });
        }

        // ─── PRODUCT DETAIL ────────────────────────────────────────────

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProduct() {
            if (!productId) {
                document.getElementById('productDetail').innerHTML = '<p>Product not found.</p>';
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/api/products/${productId}`);
                if (!response.ok) throw new Error('Product not found');
                const product = await response.json();

                document.getElementById('productDetail').innerHTML = `
                    <div class="product-images">
                        <img src="${product.image_url || 'https://via.placeholder.com/500?text=No+Image'}" alt="${product.name}">
                    </div>
                    <div class="product-info-detail">
                        <h1>${product.name}</h1>
                        <p class="price-large">KES ${product.price ? product.price.toLocaleString() : '0'}</p>
                        <p class="stock ${product.stock > 0 ? 'in-stock' : 'out-of-stock'}">
                            ${product.stock > 0 ? `In Stock (${product.stock} available)` : 'Out of Stock'}
                        </p>
                        <p class="description">${product.description || 'No description available.'}</p>
                        
                        <div class="quantity-selector">
                            <label>Quantity:</label>
                            <input type="number" id="quantity" value="1" min="1" max="${product.stock || 1}">
                        </div>
                        
                        <div class="product-actions">
                            <button class="btn btn-primary btn-large" onclick="addToCart(${product.id})" ${product.stock === 0 ? 'disabled' : ''}>
                                <i class="fas fa-shopping-cart"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading product:', error);
                document.getElementById('productDetail').innerHTML = '<p>Failed to load product. Please try again.</p>';
            }
        }

        async function loadReviews() {
            if (!productId) return;
            try {
                const response = await fetch(`${API_BASE_URL}/api/reviews/product/${productId}`);
                if (!response.ok) throw new Error('Failed to load reviews');
                const reviews = await response.json();
                
                const reviewsList = document.getElementById('reviewsList');
                if (!reviews || reviews.length === 0) {
                    reviewsList.innerHTML = '<p>No reviews yet. Be the first to review!</p>';
                } else {
                    reviewsList.innerHTML = reviews.map(review => `
                        <div class="review-card">
                            <div class="review-header">
                                <span class="reviewer">${review.user_name || 'Anonymous'}</span>
                                <span class="review-date">${review.created_at ? new Date(review.created_at).toLocaleDateString() : ''}</span>
                            </div>
                            <div class="rating">${'★'.repeat(review.rating || 0)}${'☆'.repeat(5 - (review.rating || 0))}</div>
                            <p>${review.comment || 'No comment'}</p>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('reviewsList').innerHTML = '<p>Failed to load reviews.</p>';
            }
        }

        async function submitReview(e) {
            e.preventDefault();
            const token = getToken();
            if (!token) {
                alert('Please login to write a review');
                return;
            }

            const data = {
                product_id: parseInt(productId),
                rating: parseInt(document.getElementById('rating').value),
                comment: document.getElementById('comment').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/reviews/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Review submitted successfully!');
                    loadReviews();
                    document.getElementById('reviewForm').reset();
                } else {
                    const error = await response.json();
                    alert(error.detail || 'Failed to submit review');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        }

        function addToCart(productId) {
            const quantity = parseInt(document.getElementById('quantity')?.value || 1);
            // Get product info from the page or fetch it
            // For now, add a minimal item
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({ id: productId, quantity: quantity });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert('Added to cart!');
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
            updateCartCount();
            loadProduct();
            loadReviews();
            
            const token = getToken();
            if (token) {
                document.getElementById('addReviewSection').style.display = 'block';
            }
        });
    </script>
</body>
</html>
