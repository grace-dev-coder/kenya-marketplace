<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="js/admin-auth.js?v=999"></script>
    <script src="js/dashboard.js?v=999"></script>
</head>
<body class="admin-body">
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <img src="../assets/logo.png" alt="Kenya Marketplace" class="sidebar-logo">
            <h3>Admin Panel</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="users.html" class="nav-item"><i class="fas fa-users"></i> Users</a>
            <a href="vendors.html" class="nav-item"><i class="fas fa-store"></i> Vendors</a>
            <a href="products.html" class="nav-item"><i class="fas fa-box"></i> Products</a>
            <a href="orders.html" class="nav-item"><i class="fas fa-shopping-bag"></i> Orders</a>
            <a href="analytics.html" class="nav-item"><i class="fas fa-chart-bar"></i> Analytics</a>
        </nav>
        <div class="sidebar-footer">
            <span id="adminName">Admin</span>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <h1>Dashboard</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon users">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalUsers">0</h3>
                    <p>Total Users</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon vendors">
                    <i class="fas fa-store"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalVendors">0</h3>
                    <p>Total Vendors</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon products">
                    <i class="fas fa-box"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalProducts">0</h3>
                    <p>Total Products</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orders">
                    <i class="fas fa-shopping-bag"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalOrders">0</h3>
                    <p>Total Orders</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon revenue">
                    <i class="fas fa-money-bill-wave"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalRevenue">KES 0</h3>
                    <p>Total Revenue</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3 id="pendingOrders">0</h3>
                    <p>Pending Orders</p>
                </div>
            </div>
        </div>

        <div class="section-card">
            <h3>Recent Orders</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="recentOrdersTable">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
