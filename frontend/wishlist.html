<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="../assets/logo.png" alt="Kenya Marketplace">
            </a>
            <div class="nav-links">
                <a href="products.html" class="nav-link">Shop</a>
                <div class="user-menu" id="userMenu" style="display:none;">
                    <span id="userName"></span>
                    <a href="#" onclick="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="wishlist-page">
        <h1>My Wishlist</h1>
        <div class="products-grid" id="wishlistGrid"></div>
    </main>

    <script>
        const API_BASE_URL = 'https://kenya-marketplace-api.onrender.com';

        function getToken() {
            return localStorage.getItem('access_token') || localStorage.getItem('token');
        }

        function getUser() {
            try {
                return JSON.parse(localStorage.getItem('user') || 'null');
            } catch {
                return null;
            }
        }

        function updateAuthUI() {
            const token = getToken();
            const user = getUser();
            const userMenu = document.getElementById('userMenu');
            const userName = document.getElementById('userName');
            
            if (token && user) {
                if (userMenu) userMenu.style.display = 'flex';
                if (userName) userName.textContent = user.full_name || user.email || 'User';
            } else {
                if (userMenu) userMenu.style.display = 'none';
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        async function loadWishlist() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('wishlistGrid').innerHTML = `
                <div class="empty-wishlist" style="text-align:center; padding:60px 20px;">
                    <i class="fas fa-heart" style="font-size:48px; color:#ccc; margin-bottom:20px;"></i>
                    <h2>Your wishlist is empty</h2>
                    <p>Save items you love and find them here anytime.</p>
                    <a href="products.html" class="btn btn-primary" style="margin-top:20px;">Discover Products</a>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
            loadWishlist();
        });
    </script>
</body>
</html>
