<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="js/main.js?v=1002"></script>
    <script src="js/auth.js?v=1002"></script>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Kenya Marketplace">
            </a>
        </div>
    </header>

    <main class="container" style="max-width: 400px; margin: 60px auto; padding: 20px;">
        <div class="auth-card" style="background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
            <h2 style="text-align: center; margin-bottom: 30px;"><i class="fas fa-user-plus"></i> Register</h2>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Full Name *</label>
                    <input type="text" id="registerName" required placeholder="John Doe" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Email *</label>
                    <input type="email" id="registerEmail" required placeholder="your@email.com" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Phone Number *</label>
                    <input type="tel" id="registerPhone" required placeholder="2547XX XXX XXX" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Password *</label>
                    <input type="password" id="registerPassword" required placeholder="Min 6 characters" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Confirm Password *</label>
                    <input type="password" id="registerConfirmPassword" required placeholder="Repeat password" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 20px; color: #666;">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </main>
</body>
</html>
