<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .loading { text-align: center; padding: 40px; color: #666; }
        .error-box { background: #f8d7da; color: #721c24; padding: 20px; border-radius: 4px; margin: 20px 0; }
        .login-prompt { text-align: center; padding: 60px 20px; }
        .empty-orders { text-align: center; padding: 60px 20px; }
        .order-card { border: 1px solid #ddd; padding: 20px; margin: 15px 0; border-radius: 8px; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .order-status { padding: 4px 12px; border-radius: 4px; background: #fff3cd; }
        .btn { padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block; }
        .btn-primary { background: #ff9900; color: white; }
        .btn-outline { border: 1px solid #ff9900; color: #ff9900; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="../assets/logo.png" alt="Kenya Marketplace">
            </a>
            <div class="nav-links">
                <a href="products.html" class="nav-link">Shop</a>
                <div class="user-menu" id="userMenu" style="display:none;">
                    <span id="userName"></span>
                    <a href="#" onclick="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="orders-page">
        <h1>My Orders</h1>
        <div id="ordersList">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading orders...
            </div>
        </div>
    </main>

    <script>
        // ─── INLINE AUTH FUNCTIONS (no external file needed) ───────────
        
        const API_BASE_URL = 'https://kenya-marketplace-api.onrender.com';

        function getToken() {
            return localStorage.getItem('access_token') || localStorage.getItem('token');
        }

        function getUser() {
            try {
                return JSON.parse(localStorage.getItem('user') || 'null');
            } catch {
                return null;
            }
        }

        function updateAuthUI() {
            const token = getToken();
            const user = getUser();
            const userMenu = document.getElementById('userMenu');
            const userName = document.getElementById('userName');
            
            if (token && user) {
                if (userMenu) userMenu.style.display = 'flex';
                if (userName) userName.textContent = user.full_name || user.email || 'User';
            } else {
                if (userMenu) userMenu.style.display = 'none';
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // ─── LOAD ORDERS ───────────────────────────────────────────────

        async function loadOrders() {
            const token = getToken();
            
            if (!token) {
                document.getElementById('ordersList').innerHTML = `
                    <div class="login-prompt">
                        <i class="fas fa-lock" style="font-size: 48px; color: #ccc; margin-bottom: 20px;"></i>
                        <h2>Please log in to view your orders</h2>
                        <a href="login.html" class="btn btn-primary" style="margin-top: 20px;">Go to Login</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/orders/`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                
                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('token');
                    document.getElementById('ordersList').innerHTML = `
                        <div class="error-box">
                            <h3>Session Expired</h3>
                            <p>Please log in again.</p>
                            <a href="login.html" class="btn btn-primary">Login Again</a>
                        </div>
                    `;
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}`);
                }
                
                const orders = await response.json();

                if (!orders || orders.length === 0) {
                    document.getElementById('ordersList').innerHTML = `
                        <div class="empty-orders">
                            <i class="fas fa-box-open" style="font-size: 48px; color: #ccc; margin-bottom: 20px;"></i>
                            <h2>No orders yet</h2>
                            <a href="products.html" class="btn btn-primary" style="margin-top: 20px;">Start Shopping</a>
                        </div>
                    `;
                } else {
                    document.getElementById('ordersList').innerHTML = orders.map(order => `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <span style="font-weight: bold;">Order #${order.id}</span>
                                    <span style="color: #666; margin-left: 10px;">${new Date(order.created_at).toLocaleDateString()}</span>
                                </div>
                                <span class="order-status">${order.status ? order.status.toUpperCase() : 'PENDING'}</span>
                            </div>
                            <div style="margin-bottom: 15px;">
                                <p><strong>Total:</strong> KES ${order.total_amount ? order.total_amount.toLocaleString() : '0'}</p>
                                <p><strong>Shipping:</strong> ${order.shipping_address || 'Not specified'}</p>
                            </div>
                            <button class="btn btn-outline" onclick="alert('Order #' + ${order.id})">View Details</button>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('ordersList').innerHTML = `
                    <div class="error-box">
                        <h3>Failed to load orders</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" class="btn btn-primary">Try Again</button>
                    </div>
                `;
            }
        }

        // ─── RUN ON PAGE LOAD ──────────────────────────────────────────

        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
            loadOrders();
        });
    </script>
</body>
</html>
