<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="../assets/logo.png" alt="Kenya Marketplace">
            </a>
            <div class="nav-links">
                <a href="products.html" class="nav-link">Shop</a>
                <div class="user-menu" id="userMenu" style="display:none;">
                    <span id="userName"></span>
                    <a href="#" onclick="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="orders-page">
        <h1>My Orders</h1>
        <div class="orders-list" id="ordersList">
            <!-- Populated by JS -->
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        async function loadOrders() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/api/orders/', {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const orders = await response.json();

                if (orders.length === 0) {
                    document.getElementById('ordersList').innerHTML = `
                        <div class="empty-orders">
                            <i class="fas fa-box-open"></i>
                            <p>No orders yet</p>
                            <a href="products.html" class="btn btn-primary">Start Shopping</a>
                        </div>
                    `;
                } else {
                    document.getElementById('ordersList').innerHTML = orders.map(order => `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <span class="order-id">Order #${order.id}</span>
                                    <span class="order-date">${new Date(order.created_at).toLocaleDateString()}</span>
                                </div>
                                <span class="order-status status-${order.status}">${order.status.toUpperCase()}</span>
                            </div>
                            <div class="order-details">
                                <p><strong>Total:</strong> KES ${order.total_amount.toLocaleString()}</p>
                                <p><strong>Shipping to:</strong> ${order.shipping_address}</p>
                            </div>
                            <div class="order-actions">
                                <a href="#" class="btn btn-outline" onclick="viewOrderDetails(${order.id})">View Details</a>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        function viewOrderDetails(orderId) {
            // Implementation for order detail modal or page
            alert('Order details feature coming soon');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadOrders();
            updateAuthUI();
        });
    </script>
</body>
</html>
