<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Kenya Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo {
            background: #FF9900;
            color: #1A1A2E;
            padding: 12px 24px;
            font-weight: 900;
            font-size: 16px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        h2 { color: #1A1A2E; margin-bottom: 0.5rem; font-size: 1.8rem; }
        .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #FF9900;
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover { background: #2980b9; }
        button[type="submit"]:disabled { background: #95a5a6; cursor: not-allowed; }
        
        #error-message {
            display: none;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .back-link {
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.9rem;
        }
        .back-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">KENYA MARKETPLACE</div>
        <h2>Admin Portal</h2>
        <p class="subtitle">Secure access for administrators</p>
        
        <form id="adminLoginForm">
            <div id="error-message"></div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="admin@kenyamarketplace.co.ke" value="admin@kenyamarketplace.co.ke">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            
            <button type="submit">Login to Dashboard</button>
        </form>
        
        <p class="back-link">
            <a href="../index.html">← Back to Store</a>
        </p>
    </div>
    
    <script src="js/admin-auth.js"></script>
</body>
</html>
