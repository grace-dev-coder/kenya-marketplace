<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #232F3E; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; }
        h1 { color: #232F3E; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { width: 100%; padding: 14px; background: #FF9900; color: #232F3E; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        .error { color: #e74c3c; background: #fdeaea; padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Admin Login</h1>
        <div class="error" id="errorMsg"></div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'https://kenya-marketplace-api.onrender.com';

        // Wake up backend
        fetch(`${API_BASE_URL}/health`).catch(() => {});

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorMsg.style.display = 'none';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Login failed');
                }
                
                // Check if admin
                if (!data.is_admin) {
                    throw new Error('Access denied. Admin only.');
                }
                
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('is_admin', 'true');
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error('Admin login error:', error);
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
