<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="admin-login-page">
    <div class="admin-login-container">
        <div class="admin-login-box">
            <img src="../assets/logo.png" alt="Kenya Marketplace" class="admin-logo">
            <h2>Admin Portal</h2>
            <p>Secure access for administrators</p>
            
            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="admin@kenyamarketplace.co.ke">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login to Dashboard</button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
            
            <a href="../frontend/index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Store</a>
        </div>
    </div>

    <script>
        async function handleAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('https://kenya-marketplace-api.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (data.user.role !== 'admin') {
                        document.getElementById('errorMessage').textContent = 'Access denied. Admin only.';
                        return;
                    }
                    localStorage.setItem('adminToken', data.access_token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMessage').textContent = data.detail || 'Login failed';
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'Network error';
            }
        }
    </script>
</body>
</html>
