<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="js/main.js?v=1003"></script>
    <script src="js/auth.js?v=1003"></script>
    <script src="js/cart.js?v=1003"></script>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Kenya Marketplace">
            </a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart (<span id="cartCount">0</span>)</a>
                <a href="orders.html">Orders</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 40px 20px;">
        <h1><i class="fas fa-shopping-cart"></i> Your Cart</h1>
        
        <div id="cartItems" style="margin-top: 30px;">
            <p>Loading cart...</p>
        </div>
        
        <div id="cartSummary" style="margin-top: 30px; display: none;">
            <div style="border-top: 2px solid #eee; padding-top: 20px; max-width: 400px; margin-left: auto;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Subtotal</span>
                    <span id="cartSubtotal">KES 0</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Shipping</span>
                    <span>KES 200</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; border-top: 1px solid #eee; padding-top: 10px;">
                    <span>Total</span>
                    <span id="cartTotal">KES 0</span>
                </div>
                <a href="checkout.html" class="btn btn-primary" style="display: block; text-align: center; margin-top: 20px; padding: 16px;">
                    <i class="fas fa-credit-card"></i> Proceed to Checkout
                </a>
            </div>
        </div>
    </main>
</body>
</html>
