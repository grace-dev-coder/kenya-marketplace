services:
  - type: web
    name: kenya-marketplace-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production

  - type: web
    name: kenya-marketplace-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: "echo 'Static site ready'"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
