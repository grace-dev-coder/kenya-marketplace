<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #232F3E; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h1 { color: #232F3E; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #FF9900; }
        .btn { width: 100%; padding: 14px; background: #FF9900; color: #232F3E; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        .btn:hover { background: #e68a00; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: #e74c3c; background: #fdeaea; padding: 12px; border-radius: 4px; margin-bottom: 15px; display: none; font-size: 14px; }
        .debug { background: #e8f4f8; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 12px; font-family: monospace; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Admin Login</h1>
        <div class="debug" id="debugBox"></div>
        <div class="error" id="errorMsg"></div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'https://kenya-marketplace-api.onrender.com';
        fetch(`${API_BASE_URL}/health`).catch(() => {});

        // Decode JWT payload
        function decodeJWT(token) {
            try {
                const base64 = token.split('.')[1];
                const json = atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
                return JSON.parse(json);
            } catch (e) {
                return null;
            }
        }

        function showDebug(msg) {
            const box = document.getElementById('debugBox');
            box.style.display = 'block';
            box.innerHTML += msg + '<br>';
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const debugBox = document.getElementById('debugBox');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorMsg.style.display = 'none';
            debugBox.style.display = 'none';
            debugBox.innerHTML = '';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const rawText = await response.text();
                const data = JSON.parse(rawText);
                
                showDebug('Response OK: ' + response.ok);
                showDebug('is_admin raw: ' + data.is_admin);
                showDebug('is_admin type: ' + typeof data.is_admin);
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Login failed');
                }
                
                // Decode token to check is_admin inside JWT
                const tokenPayload = decodeJWT(data.access_token);
                showDebug('Token is_admin: ' + tokenPayload?.is_admin);
                showDebug('Token is_admin type: ' + typeof tokenPayload?.is_admin);
                
                // FINAL CHECK: Use token payload which definitely has is_admin
                const isAdmin = tokenPayload && tokenPayload.is_admin === true;
                showDebug('FINAL isAdmin: ' + isAdmin);
                
                if (!isAdmin) {
                    throw new Error('Access denied. Admin only.');
                }
                
                // Save and redirect
                localStorage.setItem('admin_token', data.access_token);
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user || {}));
                localStorage.setItem('is_admin', '1');
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = error.message || 'Login failed. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
