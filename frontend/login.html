<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #232F3E 0%, #37475A 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 400px; 
        }
        .login-box h2 { 
            text-align: center; 
            margin-bottom: 10px; 
            color: #232F3E; 
            font-size: 1.8rem;
        }
        .login-box .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #333; 
            font-size: 14px;
        }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-size: 15px; 
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #FF9900;
        }
        button[type="submit"] { 
            width: 100%; 
            padding: 14px; 
            background: #FF9900; 
            color: #232F3E; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        button[type="submit"]:hover { 
            background: #e68a00; 
        }
        button[type="submit"]:disabled { 
            background: #95a5a6; 
            cursor: not-allowed; 
        }
        #error-message {
            display: none;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .register-link { 
            text-align: center; 
            margin-top: 20px; 
            color: #666; 
            font-size: 14px;
        }
        .register-link a { 
            color: #27ae60; 
            text-decoration: none; 
            font-weight: 700; 
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .logo-small {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-small span {
            background: #FF9900;
            color: #232F3E;
            padding: 8px 15px;
            font-weight: 900;
            font-size: 14px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-small">
            <span>KENYA MARKETPLACE</span>
        </div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your account</p>
        
        <form id="loginForm">
            <div id="error-message"></div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit">Login</button>
        </form>
        
        <p class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </p>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
