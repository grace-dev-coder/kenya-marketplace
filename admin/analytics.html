<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="admin-body">
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <img src="../assets/logo.png" alt="Kenya Marketplace" class="sidebar-logo">
            <h3>Admin Panel</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="users.html" class="nav-item"><i class="fas fa-users"></i> Users</a>
            <a href="vendors.html" class="nav-item"><i class="fas fa-store"></i> Vendors</a>
            <a href="products.html" class="nav-item"><i class="fas fa-box"></i> Products</a>
            <a href="orders.html" class="nav-item"><i class="fas fa-shopping-bag"></i> Orders</a>
            <a href="analytics.html" class="nav-item active"><i class="fas fa-chart-bar"></i> Analytics</a>
        </nav>
        <div class="sidebar-footer">
            <span id="adminName">Admin</span>
            <a href="#" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <h1>Analytics & Reports</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon revenue">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-info">
                    <h3>KES 0</h3>
                    <p>This Month Revenue</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orders">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <div class="stat-info">
                    <h3>0</h3>
                    <p>This Month Orders</p>
                </div>
            </div>
        </div>

        <div class="section-card">
            <h3>Sales Overview</h3>
            <p>Analytics charts would be implemented here using Chart.js or similar library.</p>
        </div>
    </main>

    <script src="js/admin-auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', checkAdminAuth);
    </script>
</body>
</html>
