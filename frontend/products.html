<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Kenya Marketplace</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="js/main.js?v=1006"></script>
    <script src="js/auth.js?v=1006"></script>
    <script src="js/products.js?v=1006"></script>
</head>
<body>
    <header class="main-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Kenya Marketplace" style="height: 40px;">
            </a>
            <nav class="main-nav" style="display: flex; gap: 20px; align-items: center;">
                <a href="index.html">Home</a>
                <a href="products.html" style="font-weight: 600;">Products</a>
                <a href="cart.html">
                    <i class="fas fa-shopping-cart"></i> 
                    Cart (<span id="cartCount">0</span>)
                </a>
                <a href="orders.html">Orders</a>
                <div id="authButtons" style="display: flex; gap: 10px;">
                    <a href="login.html" class="btn btn-outline">Login</a>
                    <a href="register.html" class="btn btn-primary">Register</a>
                </div>
                <div id="userMenu" style="display: none; align-items: center; gap: 10px;">
                    <span id="userName">User</span>
                    <a href="#" onclick="logout()" class="btn btn-outline">Logout</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 40px 20px;">
        <h1><i class="fas fa-box"></i> Our Products</h1>
        
        <!-- Filters -->
        <div style="display: flex; gap: 15px; margin: 30px 0; flex-wrap: wrap;">
            <input type="text" id="searchInput" placeholder="Search products..." 
                   oninput="filterProducts()"
                   style="flex: 1; min-width: 200px; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            <select id="categoryFilter" onchange="filterProducts()" 
                    style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; min-width: 150px;">
                <option value="">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Home & Garden">Home & Garden</option>
                <option value="Food & Groceries">Food & Groceries</option>
                <option value="Sports">Sports</option>
                <option value="Beauty">Beauty</option>
                <option value="Books">Books</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <!-- Products Grid -->
        <div id="productsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;">
            <p style="text-align: center; padding: 40px; grid-column: 1 / -1;">Loading products...</p>
        </div>
    </main>

    <footer style="background: #1a1a2e; color: #fff; padding: 40px 20px; margin-top: 60px;">
        <div class="container" style="text-align: center;">
            <p>&copy; 2024 Kenya Marketplace. All rights reserved.</p>
        </div>
    </footer>

    <!-- Toast -->
    <div id="toast" class="toast" style="display: none; position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; border-radius: 8px; color: #fff; font-weight: 500; z-index: 1000;"></div>
</body>
</html>
