<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya Marketplace</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <img src="../assets/logo.png" alt="Kenya Marketplace" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div class="logo-fallback" style="display:none; background:#FF9900; color:#232F3E; padding:10px 20px; font-weight:900; font-size:18px;">KENYA MARKETPLACE</div>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products...">
            <button id="searchBtn">🔍</button>
        </div>
        
        <div class="header-actions">
            <a href="cart.html" class="cart-link">
                🛒 <span id="cartCount">0</span>
            </a>
            <div id="authSection">
                <a href="login.html" class="login-link">Login</a>
            </div>
        </div>
    </header>

    <main class="container">
        <aside class="filters">
            <h3>Filters</h3>
            
            <div class="filter-group">
                <label>Category</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="home">Home & Garden</option>
                    <option value="beauty">Beauty & Health</option>
                    <option value="sports">Sports</option>
                    <option value="food">Food & Groceries</option>
                    <option value="automotive">Automotive</option>
                    <option value="books">Books</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Price Range (KES)</label>
                <div class="price-inputs">
                    <input type="number" id="minPrice" placeholder="Min">
                    <input type="number" id="maxPrice" placeholder="Max">
                </div>
            </div>
            
            <div class="filter-group">
                <label>Sort By</label>
                <select id="sortBy">
                    <option value="newest">Newest</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                    <option value="rating">Top Rated</option>
                </select>
            </div>
            
            <button id="applyFilters" class="btn-primary">Apply Filters</button>
            <button id="clearFilters" class="btn-secondary">Clear</button>
        </aside>

        <section class="products-section">
            <h1>All Products</h1>
            <div id="productsContainer">
                <div class="loading">Loading products...</div>
            </div>
            <div id="pagination" class="pagination"></div>
        </section>
    </main>

    <!-- Scripts MUST be in this exact order -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
