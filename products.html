<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        header { background: #2c3e50; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .logo { background: #f39c12; padding: 10px 20px; font-weight: bold; color: #2c3e50; }
        .search-bar { display: flex; flex: 1; max-width: 400px; margin: 0 20px; }
        .search-bar input { flex: 1; padding: 10px; border: none; border-radius: 4px 0 0 4px; }
        .search-bar button { padding: 10px 15px; background: #e67e22; border: none; color: white; border-radius: 0 4px 4px 0; cursor: pointer; }
        nav a { color: white; text-decoration: none; margin-left: 15px; }
        .products-page { display: grid; grid-template-columns: 250px 1fr; gap: 20px; max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .filters { background: white; padding: 20px; border-radius: 8px; height: fit-content; }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .filter-group select, .filter-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 5px; }
        .products-section h1 { margin-bottom: 15px; }
        #loading { text-align: center; padding: 40px; color: #666; }
        #products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        @media (max-width: 768px) {
            .products-page { grid-template-columns: 1fr; }
            header { flex-direction: column; }
            .search-bar { margin: 10px 0; width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KENYA MARKETPLACE</div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search products...">
            <button id="search-btn">🔍</button>
        </div>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="cart.html">🛒 Cart <span id="cart-count">0</span></a>
            <a href="register.html" style="background:#27ae60; padding:8px 16px; border-radius:4px; color:white; text-decoration:none; margin-right:10px;">Register</a><a href="login.html" style="background:#3498db; padding:8px 16px; border-radius:4px; color:white; text-decoration:none;">Login</a>
        </nav>
    </header>

    <main class="products-page">
        <aside class="filters">
            <h3>Filters</h3>
            <div class="filter-group">
                <label>Category</label>
                <select id="category-filter">
                    <option value="All Categories">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Home">Home & Garden</option>
                    <option value="Food">Food & Groceries</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Price Range (KES)</label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="min-price" placeholder="Min">
                    <input type="number" id="max-price" placeholder="Max">
                </div>
            </div>
            <div class="filter-group">
                <label>Sort By</label>
                <select id="sort-by">
                    <option value="newest">Newest</option>
                    <option value="price_low">Price: Low to High</option>
                    <option value="price_high">Price: High to Low</option>
                </select>
            </div>
            <div class="filter-group">
                <button id="apply-filters" style="width:100%; padding:10px; background:#f39c12; border:none; border-radius:4px; cursor:pointer; font-weight:600;">Apply Filters</button>
                <button id="clear-filters" style="width:100%; padding:10px; background:#ddd; border:none; border-radius:4px; cursor:pointer; margin-top:5px;">Clear</button>
            </div>
        </aside>

        <section class="products-section">
            <h1>All Products</h1>
            <div id="loading">Loading products...</div>
            <div id="products-container"></div>
        </section>
    </main>

    <script src="js/products.js"></script>
</body>
</html>
