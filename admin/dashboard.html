<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        
        .sidebar {
            background: #232F3E;
            color: white;
            width: 250px;
            min-height: 100vh;
            position: fixed;
            padding: 20px;
        }
        .sidebar h2 { margin-bottom: 30px; color: #FF9900; }
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .sidebar a:hover, .sidebar a.active { background: #37475A; }
        
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card h3 { color: #666; font-size: 0.9rem; margin-bottom: 10px; }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: #232F3E; }
        
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🛒 Admin Panel</h2>
        <a href="dashboard.html" class="active">📊 Dashboard</a>
        <a href="users.html">👥 Users</a>
        <a href="vendors.html">🏪 Vendors</a>
        <a href="products.html">📦 Products</a>
        <a href="orders.html">🛍️ Orders</a>
        <a href="analytics.html">📈 Analytics</a>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1>Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="number" id="total-users">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Products</h3>
                <div class="number" id="total-products">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="number" id="total-orders">0</div>
            </div>
            <div class="stat-card">
                <h3>Revenue (KES)</h3>
                <div class="number" id="total-revenue">0</div>
            </div>
        </div>
    </div>
    
    <script src="js/admin-auth.js?v=999"></script>
    <script>
        // Protect page
        if (!checkAdminAuth()) {
            window.location.href = 'login.html';
        }
        
        // Load stats from API
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/admin/stats`, {
                    headers: {
                        'Authorization': `Bearer ${getAdminToken()}`
                    }
                });
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('total-users').textContent = data.users || 0;
                    document.getElementById('total-products').textContent = data.products || 0;
                    document.getElementById('total-orders').textContent = data.orders || 0;
                    document.getElementById('total-revenue').textContent = (data.revenue || 0).toLocaleString();
                }
            } catch (e) {
                console.log('Stats load failed:', e);
            }
        }
        
        loadStats();
    </script>
</body>
</html>
