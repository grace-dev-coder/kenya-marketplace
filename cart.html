<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        
        .main-header {
            background: #232F3E;
            color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .logo {
            background: #FF9900;
            color: #232F3E;
            padding: 8px 15px;
            font-weight: 900;
            font-size: 12px;
            border-radius: 3px;
            white-space: nowrap;
            flex-shrink: 0;
            line-height: 1.3;
            text-align: center;
        }
        .menu-btn {
            background: #FF9900;
            border: none;
            color: #232F3E;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 15px;
            top: 50px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            min-width: 200px;
            z-index: 1000;
            overflow: hidden;
        }
        .dropdown-menu.active { display: block; }
        .dropdown-menu a {
            display: block;
            padding: 15px 20px;
            color: #232F3E;
            text-decoration: none;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .dropdown-menu a:hover { background: #f5f5f5; }
        
        .cart-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .cart-container h1 {
            margin-bottom: 20px;
            color: #232F3E;
        }
        .cart-item {
            display: flex;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            align-items: center;
        }
        .cart-item .item-icon {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .cart-item-info { flex: 1; }
        .cart-item-info h3 { margin-bottom: 5px; font-size: 1rem; }
        .cart-item-info p { color: #e67e22; font-weight: bold; }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-item-qty button {
            width: 30px;
            height: 30px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .cart-item-qty span { font-weight: bold; min-width: 20px; text-align: center; }
        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .cart-summary {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .cart-summary h3 { margin-bottom: 15px; }
        .cart-summary p { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .cart-summary .total { font-size: 1.2rem; font-weight: bold; color: #232F3E; border-top: 2px solid #eee; padding-top: 10px; }
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: #FF9900;
            color: #232F3E;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-cart a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
        
        footer {
            background: #232F3E;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">KENYA<br>MARKETPLACE</div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="index.html">🏠 Home</a>
            <a href="products.html">📦 Products</a>
            <a href="register.html">📝 Register</a>
            <a href="login.html">🔑 Login</a>
        </div>
    </header>

    <div class="cart-container">
        <h1>🛒 Shopping Cart</h1>
        <div id="cart-items"></div>
        <div id="cart-summary"></div>
    </div>

    <footer>
        <p>&copy; 2024 Kenya Marketplace. All rights reserved.</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('dropdownMenu').classList.toggle('active');
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('dropdownMenu');
            const btn = document.querySelector('.menu-btn');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div style="font-size:4rem; margin-bottom:15px;">🛒</div>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added anything yet.</p>
                        <p><a href="products.html">Start Shopping →</a></p>
                    </div>
                `;
                summary.innerHTML = '';
                return;
            }
            
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <div class="item-icon">📦</div>
                        <div class="cart-item-info">
                            <h3>${item.name}</h3>
                            <p>KES ${item.price.toLocaleString()}</p>
                        </div>
                        <div class="cart-item-qty">
                            <button onclick="updateQty(${index}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQty(${index}, 1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                    </div>
                `;
            }).join('');
            
            summary.innerHTML = `
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <p><span>Subtotal:</span> <span>KES ${total.toLocaleString()}</span></p>
                    <p><span>Shipping:</span> <span>KES 0</span></p>
                    <p class="total"><span>Total:</span> <span>KES ${total.toLocaleString()}</span></p>
                    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
                </div>
            `;
        }

        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function checkout() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Please login to checkout');
                window.location.href = 'login.html';
                return;
            }
            alert('Checkout functionality coming soon!');
        }

        loadCart();
    </script>
</body>
</html>
