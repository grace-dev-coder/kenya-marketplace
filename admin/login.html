<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #232F3E; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h1 { color: #232F3E; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #FF9900; }
        .btn { width: 100%; padding: 14px; background: #FF9900; color: #232F3E; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        .btn:hover { background: #e68a00; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: #e74c3c; background: #fdeaea; padding: 12px; border-radius: 4px; margin-bottom: 15px; display: none; font-size: 14px; }
        .debug-info { background: #fff3cd; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Admin Login</h1>
        <div class="debug-info" id="debugInfo"></div>
        <div class="error" id="errorMsg"></div>
        <form id="adminLoginForm" onsubmit="return false;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@example.com" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="off">
            </div>
            <button type="button" class="btn" id="loginBtn">Login</button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'https://kenya-marketplace-api.onrender.com';

        // Debug info
        const debugBox = document.getElementById('debugInfo');
        const token = localStorage.getItem('admin_token');
        const isAdmin = localStorage.getItem('is_admin');
        
        debugBox.innerHTML = `
            <strong>Debug:</strong><br>
            admin_token: ${token ? 'EXISTS' : 'NULL'}<<br>
            is_admin: ${isAdmin}<br>
            URL: ${window.location.href}
        `;

        // Wake up backend
        fetch(`${API_BASE_URL}/health`).catch(() => {});

        // Manual click handler instead of form submit
        document.getElementById('loginBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorMsg.style.display = 'none';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            debugBox.innerHTML += '<br><strong>Clicked login button</strong>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const data = await response.json();
                debugBox.innerHTML += '<br>Response: ' + response.status;
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Login failed');
                }
                
                if (data.is_admin !== true) {
                    throw new Error('Access denied. Admin only.');
                }
                
                // Save token
                localStorage.setItem('admin_token', data.access_token);
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user || {}));
                localStorage.setItem('is_admin', '1');
                
                debugBox.innerHTML += '<br>Token saved. Redirecting...';
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                debugBox.innerHTML += '<br>Error: ' + error.message;
                errorMsg.textContent = error.message || 'Login failed. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
