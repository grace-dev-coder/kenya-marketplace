<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { background: #fff; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; }
        .logo { background: #ff8c00; color: #fff; padding: 10px 20px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        h2 { color: #333; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #3498db; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #2980b9; }
        #error-message { display: none; color: #dc3545; margin-top: 10px; font-size: 14px; }
        .login-footer { margin-top: 20px; }
        .back-link { color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">KENYA<br>MARKETPLACE</div>
        <h2>Admin Portal</h2>
        <p class="subtitle">Secure access for administrators</p>
        
        <form id="admin-login-form" onsubmit="return false;">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required value="admin@kenyamarketplace.co.ke">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <button type="button" onclick="doLogin()">Login to Dashboard</button>
        </form>
        
        <div id="error-message"></div>
        
        <div class="login-footer">
            <a href="http://localhost:3000/index.html" class="back-link">← Back to Store</a>
        </div>
    </div>

    <script>
        function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            
            if (errorMessage) {
                errorMessage.style.display = 'none';
                errorMessage.textContent = '';
            }

            fetch('http://localhost:8000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(response => response.json())
            .then(data => {
                if (!data.is_admin) {
                    if (errorMessage) {
                        errorMessage.textContent = 'Access denied. Admin only';
                        errorMessage.style.display = 'block';
                    }
                } else {
                    localStorage.setItem('admin_token', data.access_token);
                    localStorage.setItem('is_admin', '1');
                    window.location.href = 'dashboard.html';
                }
            })
            .catch(error => {
                if (errorMessage) {
                    errorMessage.textContent = error.message;
                    errorMessage.style.display = 'block';
                }
            });
        }
    </script>
</body>
</html>
