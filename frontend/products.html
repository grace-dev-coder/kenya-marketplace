<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <title>All Products - Kenya Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        
        .main-header {
            background: #232F3E;
            color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .logo {
            background: #FF9900;
            color: #232F3E;
            padding: 8px 15px;
            font-weight: 900;
            font-size: 12px;
            border-radius: 3px;
            white-space: nowrap;
            flex-shrink: 0;
            line-height: 1.3;
            text-align: center;
        }
        .search-bar {
            display: flex;
            flex: 1;
            max-width: 500px;
            min-width: 100px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px 0 0 4px;
            font-size: 14px;
        }
        .search-bar button {
            padding: 10px 15px;
            background: #FF9900;
            border: none;
            color: #232F3E;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        .menu-btn {
            background: #FF9900;
            border: none;
            color: #232F3E;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 15px;
            top: 50px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            min-width: 200px;
            z-index: 1000;
            overflow: hidden;
        }
        .dropdown-menu.active { display: block; }
        .dropdown-menu a {
            display: block;
            padding: 15px 20px;
            color: #232F3E;
            text-decoration: none;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .dropdown-menu a:hover { background: #f5f5f5; }
        .dropdown-menu .btn-register {
            background: #27ae60;
            color: white !important;
            font-weight: 700;
            text-align: center;
            margin: 10px;
            border-radius: 4px;
            border: none;
        }
        .dropdown-menu .btn-login {
            background: #5dade2;
            color: white !important;
            font-weight: 600;
            text-align: center;
            margin: 10px;
            border-radius: 4px;
            border: none;
        }
        
        .products-page {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .filters {
            background: white;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .filter-group select, .filter-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 5px; }
        .products-section h1 { margin-bottom: 15px; font-size: 1.5rem; }
        #loading { text-align: center; padding: 40px; color: #666; }
        #products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* Product card styles */
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .product-info { padding: 15px; }
        .product-info h3 { margin-bottom: 8px; font-size: 16px; }
        .product-info .price { color: #FF9900; font-weight: 700; font-size: 18px; margin-bottom: 5px; }
        .product-info .category { color: #666; font-size: 14px; margin-bottom: 10px; }
        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-outline {
            background: white;
            border: 1px solid #FF9900;
            color: #FF9900;
        }
        .btn-primary {
            background: #FF9900;
            color: #232F3E;
            font-weight: 600;
        }
        
        footer {
            background: #232F3E;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .products-page { grid-template-columns: 1fr; }
            .filters { order: -1; }
        }
    </style>
    <!-- Load cart.js FIRST so addToCart is available -->
    <script src="js/cart.js?v=999"></script>
    <script src="js/products.js?v=999"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">KENYA<br>MARKETPLACE</div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search products...">
            <button id="search-btn">🔍</button>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="index.html">🏠 Home</a>
            <a href="register.html" class="btn-register">Register</a>
            <a href="login.html" class="btn-login">Login</a>
            <a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
        </div>
    </header>

    <main class="products-page">
        <aside class="filters">
            <h3>Filters</h3>
            <div class="filter-group">
                <label>Category</label>
                <select id="category-filter">
                    <option value="All Categories">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Home">Home & Garden</option>
                    <option value="Food">Food & Groceries</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Price Range (KES)</label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="min-price" placeholder="Min">
                    <input type="number" id="max-price" placeholder="Max">
                </div>
            </div>
            <div class="filter-group">
                <label>Sort By</label>
                <select id="sort-by">
                    <option value="newest">Newest</option>
                    <option value="price_low">Price: Low to High</option>
                    <option value="price_high">Price: High to Low</option>
                </select>
            </div>
            <div class="filter-group">
                <button id="apply-filters" style="width:100%; padding:10px; background:#f39c12; border:none; border-radius:4px; cursor:pointer; font-weight:600;">Apply Filters</button>
                <button id="clear-filters" style="width:100%; padding:10px; background:#ddd; border:none; border-radius:4px; cursor:pointer; margin-top:5px;">Clear</button>
            </div>
        </aside>

        <section class="products-section">
            <h1>All Products</h1>
            <div id="loading">Loading products...</div>
            <div id="products-container"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Kenya Marketplace. All rights reserved.</p>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('dropdownMenu').classList.toggle('active');
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('dropdownMenu');
            const btn = document.querySelector('.menu-btn');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('active');
            }
        });
        
        // Update cart count on page load
        if (typeof updateCartCount === 'function') {
            updateCartCount();
        } else {
            // Fallback if cart.js isn't loaded
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            document.getElementById('cartCount').textContent = count;
        }
    </script>
</body>
</html>
